name: Windows AIO Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-aio:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements-optional.txt

      - name: Run tests
        shell: pwsh
        run: |
          python -m pytest -q -r s

      - name: Build Windows AIO zip
        id: bundle
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "sha-${{ github.sha }}" }
          $bundleName = "Ultra_Optimizer-Windows-AIO-$version"
          $staging = Join-Path $env:RUNNER_TEMP $bundleName
          $wheelhouse = Join-Path $staging "wheels"
          $wheelhouseWindows = Join-Path $env:RUNNER_TEMP "wheelhouse-windows-py312"
          $wheelhouseLinux = Join-Path $env:RUNNER_TEMP "wheelhouse-linux-py312"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          New-Item -ItemType Directory -Path $wheelhouse -Force | Out-Null
          New-Item -ItemType Directory -Path $wheelhouseWindows -Force | Out-Null
          New-Item -ItemType Directory -Path $wheelhouseLinux -Force | Out-Null

          python -m pip download --dest $wheelhouseWindows --only-binary=:all: --platform win_amd64 --implementation cp --python-version 312 --abi cp312 -r requirements.txt
          python -m pip download --dest $wheelhouseWindows --only-binary=:all: --platform win_amd64 --implementation cp --python-version 312 --abi cp312 -r requirements-optional.txt
          python -m pip download --dest $wheelhouseWindows --only-binary=:all: --platform win_amd64 --implementation cp --python-version 312 --abi cp312 -r requirements-dev.txt

          python -m pip download --dest $wheelhouseLinux --only-binary=:all: --platform manylinux_2_31_x86_64 --platform manylinux2014_x86_64 --implementation cp --python-version 312 --abi cp312 -r requirements.txt
          python -m pip download --dest $wheelhouseLinux --only-binary=:all: --platform manylinux_2_31_x86_64 --platform manylinux2014_x86_64 --implementation cp --python-version 312 --abi cp312 -r requirements-optional.txt
          python -m pip download --dest $wheelhouseLinux --only-binary=:all: --platform manylinux_2_31_x86_64 --platform manylinux2014_x86_64 --implementation cp --python-version 312 --abi cp312 -r requirements-dev.txt

          Get-ChildItem -Path $wheelhouseWindows -Filter *.whl | Sort-Object Name | ForEach-Object {
            "{0}  {1}" -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant(), $_.Name
          } | Set-Content -Path (Join-Path $wheelhouseWindows "SHA256SUMS.txt")

          Get-ChildItem -Path $wheelhouseLinux -Filter *.whl | Sort-Object Name | ForEach-Object {
            "{0}  {1}" -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant(), $_.Name
          } | Set-Content -Path (Join-Path $wheelhouseLinux "SHA256SUMS.txt")

          Copy-Item -Path (Join-Path $wheelhouseWindows "*") -Destination $wheelhouse -Force

          Copy-Item Ultra_Optimizer.py $staging
          Copy-Item ArcWelder.exe $staging -ErrorAction SilentlyContinue
          Copy-Item requirements.txt $staging
          Copy-Item requirements-dev.txt $staging
          Copy-Item requirements-optional.txt $staging
          Copy-Item requirements-windows.txt $staging
          Copy-Item README.md $staging
          Copy-Item LICENSE $staging
          Copy-Item AGENTS.md $staging
          Copy-Item -Recurse docs $staging
          Copy-Item -Recurse GCodeZAA $staging
          Copy-Item -Recurse scripts/windows $staging/scripts
          Copy-Item -Recurse scripts/linux $staging/scripts

          $installerLauncher = Join-Path $staging "INSTALL_WINDOWS_AIO.bat"
          Set-Content -Path $installerLauncher -Value "@echo off`r`ncall scripts\bootstrap.bat -InstallDev -UseBundledWheels`r`n"

          $zipPath = Join-Path $env:RUNNER_TEMP "$bundleName.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path "$staging\*" -DestinationPath $zipPath

          $windowsWheelZipPath = Join-Path $env:RUNNER_TEMP "Ultra_Optimizer-Wheelhouse-windows-py312-$version.zip"
          if (Test-Path $windowsWheelZipPath) {
            Remove-Item $windowsWheelZipPath -Force
          }
          Compress-Archive -Path "$wheelhouseWindows\*" -DestinationPath $windowsWheelZipPath

          $linuxWheelZipPath = Join-Path $env:RUNNER_TEMP "Ultra_Optimizer-Wheelhouse-linux-py312-$version.zip"
          if (Test-Path $linuxWheelZipPath) {
            Remove-Item $linuxWheelZipPath -Force
          }
          Compress-Archive -Path "$wheelhouseLinux\*" -DestinationPath $linuxWheelZipPath

          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "bundle_name=$bundleName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "windows_wheel_zip_path=$windowsWheelZipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "linux_wheel_zip_path=$linuxWheelZipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload AIO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.bundle.outputs.bundle_name }}
          path: ${{ steps.bundle.outputs.zip_path }}

      - name: Upload Windows wheelhouse artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-wheelhouse-py312
          path: ${{ steps.bundle.outputs.windows_wheel_zip_path }}

      - name: Upload Linux wheelhouse artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-wheelhouse-py312
          path: ${{ steps.bundle.outputs.linux_wheel_zip_path }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.bundle.outputs.zip_path }}
            ${{ steps.bundle.outputs.windows_wheel_zip_path }}
            ${{ steps.bundle.outputs.linux_wheel_zip_path }}
          generate_release_notes: true
