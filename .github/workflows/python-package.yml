name: Python package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: py${{ matrix.python-version }} / ${{ matrix.open3d && 'with-open3d' || 'without-open3d' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]
        open3d: [false, true]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install optional Open3D
        if: matrix.open3d
        run: |
          pip install open3d

      - name: Run tests
        run: |
          python -m pytest -q -r s
